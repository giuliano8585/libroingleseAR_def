<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose an item</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #0B1A4A 0%, #1B0B45 45%, #0A2640 100%);
      min-height: 100vh; overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 70% 30%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%);
      pointer-events: none;
      animation: twinkle 4s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes twinkle { from{opacity:0.5} to{opacity:1} }

    /* HEADER */
    #top-bar {
      position: relative; z-index: 10;
      padding: 1.5rem 1rem 0;
      display: flex; align-items: center; gap: 1rem;
    }
    #back-btn {
      background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.25); border-radius: 50%;
      width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white; font-size: 1.5rem;
      text-decoration: none; flex-shrink: 0;
      transition: transform 0.15s, background 0.15s;
    }
    #back-btn:hover  { background: rgba(255,255,255,0.2); transform: scale(1.1); }
    #back-btn:active { transform: scale(0.9); }

    .page-badge {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem; color: white;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 2rem; padding: 0.35rem 1rem;
    }

    /* CATEGORY HERO */
    #cat-hero {
      position: relative; z-index: 10;
      text-align: center; padding: 2rem 1rem 1rem;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .cat-emoji-big {
      font-size: 5.5rem;
      display: block;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
      animation: emojiFloat 3s ease-in-out infinite;
    }
    @keyframes emojiFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .cat-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 6vw, 3rem);
      background: linear-gradient(135deg, #fff 30%, #A78BFA 70%, #60A5FA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 0.5rem; line-height: 1.1;
    }
    .cat-sub {
      color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 0.3rem;
    }

    /* ITEMS GRID */
    .items-grid {
      position: relative; z-index: 10;
      max-width: 900px; margin: 1.5rem auto 4rem;
      padding: 0 1.2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1.2rem;
    }

    /* ITEM CARD */
    .item-card {
      border-radius: 1.6rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      aspect-ratio: 3/4;
      background: linear-gradient(160deg, var(--c1), var(--c2));
      border: 3px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 20px var(--glow, rgba(0,0,0,0.3));
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s;
      animation: cardIn 0.55s cubic-bezier(.34,1.56,.64,1) both;
      animation-delay: var(--delay, 0s);
      -webkit-tap-highlight-color: transparent;
    }
    @keyframes cardIn {
      from { opacity:0; transform:scale(0.45) rotate(-10deg); }
      to   { opacity:1; transform:scale(1) rotate(0); }
    }
    .item-card:hover {
      transform: scale(1.1) rotate(-2deg);
      box-shadow: 0 0 38px var(--glow, rgba(0,0,0,0.3)), 0 0 0 3px white;
    }
    .item-card:active { transform: scale(0.95); }
    /* polka dots */
    .item-card::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.13) 2px, transparent 2px);
      background-size: 18px 18px;
      pointer-events: none;
    }
    /* shine */
    .item-card::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 55%);
      pointer-events: none;
    }

    .item-3d-badge {
      position: absolute; top: 10px; right: 10px; z-index: 2;
      background: rgba(255,255,255,0.3); backdrop-filter: blur(8px);
      border-radius: 0.5rem; padding: 2px 7px;
      font-size: 0.58rem; font-weight: 900;
      color: white; letter-spacing: 0.1em; text-transform: uppercase;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }
    .lang-dots {
      position: absolute; top: 10px; left: 10px; z-index: 2;
      display: flex; gap: 3px;
    }
    .lang-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.6);
      font-size: 0.55rem; display: flex; align-items: center; justify-content: center;
    }
    .item-emoji-wrap {
      position: absolute; bottom: 52px; left: 0; right: 0;
      display: flex; align-items: flex-end; justify-content: center;
      height: 55%; z-index: 2;
    }
    .item-big-emoji {
      font-size: 4rem;
      filter: drop-shadow(0 5px 14px rgba(0,0,0,0.4));
      transition: transform 0.3s ease;
    }
    .item-card:hover .item-big-emoji { transform: scale(1.15) translateY(-6px); }
    .item-name-en {
      position: absolute; bottom: 24px; left: 0; right: 0; z-index: 2;
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem; color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .item-name-it {
      position: absolute; bottom: 6px; left: 0; right: 0; z-index: 2;
      text-align: center;
      font-size: 0.72rem; color: rgba(255,255,255,0.65);
      font-style: italic;
    }

    @media (max-width: 480px) {
      .items-grid { grid-template-columns: repeat(3, 1fr); gap: 0.75rem; }
      .item-big-emoji { font-size: 3rem; }
      .item-name-en { font-size: 0.88rem; }
      .item-name-it { font-size: 0.62rem; }
    }
    @media (max-width: 360px) {
      .items-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

  const pal = ITEM_PALETTES[idx % ITEM_PALETTES.length];
  const card = document.createElement('div');
  card.className = 'item-card';
  card.style.cssText = `--c1:${pal.c1};--c2:${pal.c2};--glow:${pal.glow};--delay:${(idx*0.1).toFixed(2)}s`;
  card.innerHTML = `
    <div class="lang-dots">
      <span title="English">🇬🇧</span><span title="Italiano">🇮🇹</span>
      <span title="Français">🇫🇷</span><span title="Español">🇪🇸</span>
    </div>
    <div class="item-3d-badge">3D</div>
    <div class="item-emoji-wrap">
      <div class="item-big-emoji">${item.emoji}</div>
    </div>
    <div class="item-name-en">${item.en}</div>
    <div class="item-name-it">${item.it}</div>
  `;
  card.addEventListener('click', () => {
    card.style.transform = 'scale(0.9)';
    setTimeout(() => {
      window.location.href = `/webapp/item.html?page=${pageNum}&idx=${idx}`;
    }, 110);
  });
  grid.appendChild(card);
});
</script>
</body>
</html>
